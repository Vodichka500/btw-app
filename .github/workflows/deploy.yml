name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd ~/btw-app
            
            # Жестко синхронизируем код с GitHub, убивая любые конфликты на сервере
            git fetch origin
            git reset --hard origin/main
            
            # Собираем и запускаем
            docker compose up -d --build btw-server
            
            # Убираем старые образы
            docker image prune -a -f
            
            # Убеждаемся, что процесс жив (если контейнер упадет, скрипт завершится с ошибкой)
            docker ps | grep btw-backend