name: Deploy to VPS

on:
  push:
    branches: [ main ]

# Название твоего образа (только маленькими буквами!)
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vodichka500/btw-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Даем GitHub Actions права на сохранение Docker-образов
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🌟 НОВОЕ: Включаем Buildx (современный движок сборки), он нужен для кэша
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Логинимся в реестр пакетов GitHub
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Собираем Docker образ мощностями GitHub и пушим его
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # 🌟 НОВОЕ: Настраиваем кэш. Теперь сборка будет летать!
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Заходим на твой VPS и деплоим
      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,IMAGE
          command_timeout: 10m
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            cd ~/btw-app
            
            git fetch origin
            git reset --hard origin/main
            
            docker pull $IMAGE
            
            docker compose up -d
            
            docker image prune -f
            
            docker ps | grep btw-backend
