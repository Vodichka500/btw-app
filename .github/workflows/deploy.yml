name: Deploy to VPS

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vodichka500/btw-backend

jobs:
  # ==========================================
  # ДЖОБА 1: ТЕСТИРОВАНИЕ
  # ==========================================
  test:
    runs-on: ubuntu-latest

    # Поднимаем временную БД PostgreSQL прямо на сервере GitHub
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: btw_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # Создаем файл .env.test, который ищут твои скрипты в package.json
      - name: Create .env.test file
        run: |
          echo "DATABASE_URL=postgresql://test_user:test_password@localhost:5432/btw_test_db?schema=public" > apps/server/.env.test

      - name: Generate Prisma Client
        run: pnpm --filter @btw-app/db exec prisma generate

      # Накатываем структуру таблиц в тестовую БД
      - name: Push Database Schema
        run: pnpm --filter @btw-app/db exec prisma db push
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/btw_test_db?schema=public

      # ЗАПУСК ТЕСТОВ (Ограничиваем concurrency, чтобы не было дедлоков в БД)
      - name: Run Tests
        run: pnpm --filter @btw-app/server run test:coverage


  # ==========================================
  # ДЖОБА 2: СБОРКА И ДЕПЛОЙ
  # ==========================================
  build-and-deploy:
    needs: test # Эта джоба ждет успешного завершения джобы "test"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Execute deployment script via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,IMAGE
          command_timeout: 10m
          script: |
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            cd ~/btw-app
            
            git fetch origin
            git reset --hard origin/main
            
            docker pull $IMAGE
            
            docker compose up -d
            
            docker image prune -f
            
            docker ps | grep btw-backend