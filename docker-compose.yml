version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: btw-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: btw_app_2025
      POSTGRES_DB: btw_db
    ports:
      - "5434:5432"
    volumes:
      - btw_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  btw-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: btw-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - ./apps/server/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://root:btw_app_2025@postgres:5432/btw_db?schema=public

networks:
  btw-network:
    driver: bridge

volumes:
  btw_postgres_data: